<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartelera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">🎬 Cartelera de Cine</h2>

    <!-- FORMULARIO CREAR -->
    <div class="card p-4 mb-4">
        <h5>Agregar Película</h5>
        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="crear">
            <div class="row">
                <div class="col">
                    <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
                </div>
                <div class="col">
                    <input type="number" name="duracion" class="form-control" placeholder="Duración" required>
                </div>
                <div class="col">
                    <button class="btn btn-success w-100">Guardar</button>
                </div>
            </div>
        </form>
    </div>

    <!-- TABLA -->
    <div class="card p-4">
        <h5>Películas</h5>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Duración</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for p in peliculas %}
                <tr>
                    <form method="POST">
                        {% csrf_token %}
                        <td>
                            <input type="hidden" name="id_pelicula" value="{{ p.id_pelicula }}">
                            <input type="text" name="nombre" value="{{ p.nombre }}" class="form-control">
                        </td>
                        <td>
                            <input type="number" name="duracion" value="{{ p.duracion }}" class="form-control">
                        </td>
                        <td class="d-flex gap-2">
                            <button name="editar" class="btn btn-primary btn-sm">Editar</button>
                            <button name="eliminar" class="btn btn-danger btn-sm"
                                onclick="return confirm('¿Seguro que deseas eliminar?')">
                                Eliminar
                            </button>
                        </td>
                    </form>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No hay películas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
